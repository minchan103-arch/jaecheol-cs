<!-- 제철삼촌 과일 추천 퀴즈 v2 | 아임웹 HTML 위젯에 붙여넣기 -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
#jcq{font-family:-apple-system,'Apple SD Gothic Neo','맑은 고딕',sans-serif;max-width:560px;margin:0 auto;padding:20px 16px}

/* ── 인트로 ── */
.jcq-intro{text-align:center}
.jcq-badge{display:inline-block;background:#fef08a;color:#92400e;font-size:11px;font-weight:700;padding:5px 14px;border-radius:999px;margin-bottom:18px;letter-spacing:.05em}
.jcq-title{font-size:26px;font-weight:900;color:#111;line-height:1.3;margin-bottom:10px}
.jcq-sub{font-size:13px;color:#6b7280;line-height:1.7;margin-bottom:28px}

.jcq-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;margin-bottom:28px;scrollbar-width:none}
.jcq-scroll::-webkit-scrollbar{display:none}
.jcq-card{flex:0 0 110px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);text-align:center}
.jcq-card img{width:110px;height:100px;object-fit:cover}
.jcq-card-name{font-size:12px;font-weight:700;color:#374151;padding:8px 4px 10px}

.jcq-cta{display:inline-block;background:#facc15;color:#111;font-size:16px;font-weight:900;padding:16px 44px;border-radius:999px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(250,204,21,.45);transition:transform .15s}
.jcq-cta:hover{transform:scale(1.04)}
.jcq-hint{font-size:11px;color:#9ca3af;margin-top:12px}

/* ── 퀴즈 ── */
.jcq-quiz{display:none}
.jcq-prog-wrap{background:#f3f4f6;border-radius:999px;height:6px;margin-bottom:8px}
.jcq-prog{background:linear-gradient(90deg,#facc15,#fb923c);height:6px;border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.jcq-step{font-size:11px;color:#9ca3af;text-align:right;margin-bottom:24px}
.jcq-q{font-size:20px;font-weight:800;color:#111;text-align:center;line-height:1.4;margin-bottom:24px;min-height:56px}
.jcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.jcq-opt{background:#fff;border:2px solid #f3f4f6;border-radius:14px;padding:16px 12px;text-align:left;cursor:pointer;transition:border-color .15s,background .15s,transform .1s;display:flex;align-items:center;gap:10px}
.jcq-opt:hover{border-color:#facc15;background:#fffde7;transform:translateY(-1px)}
.jcq-opt:active{transform:scale(.97)}
.jcq-opt .oe{font-size:26px;flex-shrink:0}
.jcq-opt .ot{font-size:13px;font-weight:600;color:#374151;line-height:1.35}

/* ── 결과 ── */
.jcq-result{display:none}
.jcq-r-img{width:100%;height:220px;object-fit:cover;border-radius:20px;margin-bottom:20px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.jcq-r-badge{display:inline-block;background:#facc15;color:#111;font-size:11px;font-weight:700;padding:4px 14px;border-radius:999px;margin-bottom:10px}
.jcq-r-name{font-size:28px;font-weight:900;color:#111;margin-bottom:6px}
.jcq-r-sub{font-size:13px;color:#6b7280;margin-bottom:20px;line-height:1.6}
.jcq-r-box{background:#f9fafb;border-radius:16px;padding:18px 20px;margin-bottom:20px}
.jcq-r-box-title{font-size:11px;font-weight:700;color:#9ca3af;margin-bottom:12px}
.jcq-r-box ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.jcq-r-box li{font-size:13px;color:#374151;display:flex;gap:8px;align-items:flex-start}
.jcq-r-box li::before{content:"✓";color:#facc15;font-weight:900;flex-shrink:0;margin-top:1px}
.jcq-buy{display:block;background:#facc15;color:#111;font-size:15px;font-weight:800;padding:16px;border-radius:999px;text-decoration:none;text-align:center;margin-bottom:10px;transition:background .15s}
.jcq-buy:hover{background:#eab308}
.jcq-share{display:block;background:#fff;border:2px solid #e5e7eb;color:#6b7280;font-size:13px;font-weight:600;padding:13px;border-radius:999px;text-align:center;cursor:pointer;margin-bottom:10px;transition:border-color .15s}
.jcq-share:hover{border-color:#facc15;color:#374151}
.jcq-retry{display:block;background:none;border:none;color:#9ca3af;font-size:13px;cursor:pointer;padding:8px;width:100%;text-align:center}
.jcq-retry:hover{color:#6b7280}
</style>

<div id="jcq">

  <!-- 인트로 -->
  <div class="jcq-intro" id="jcq-intro">
    <span class="jcq-badge">🍊 제철삼촌 추천 테스트</span>
    <h2 class="jcq-title">나에게 딱 맞는<br>제철과일은 뭘까요?</h2>
    <p class="jcq-sub">5가지 질문으로 취향에 꼭 맞는<br>제철과일을 찾아드려요!</p>

    <div class="jcq-scroll" id="jcq-preview"></div>

    <button class="jcq-cta" onclick="jcqStart()">10초만에 내 과일 찾기 →</button>
    <p class="jcq-hint">8가지 제철과일 중 나에게 딱 맞는 것 🍓</p>
  </div>

  <!-- 퀴즈 -->
  <div class="jcq-quiz" id="jcq-quiz">
    <div class="jcq-prog-wrap"><div class="jcq-prog" id="jcq-prog" style="width:0%"></div></div>
    <div class="jcq-step" id="jcq-step">1 / 5</div>
    <div class="jcq-q" id="jcq-q"></div>
    <div class="jcq-opts" id="jcq-opts"></div>
  </div>

  <!-- 결과 -->
  <div class="jcq-result" id="jcq-result">
    <img class="jcq-r-img" id="jcq-r-img" src="" alt="">
    <div style="text-align:center;margin-bottom:20px">
      <span class="jcq-r-badge">추천 과일</span>
      <h3 class="jcq-r-name" id="jcq-r-name"></h3>
      <p class="jcq-r-sub" id="jcq-r-sub"></p>
    </div>
    <div class="jcq-r-box">
      <div class="jcq-r-box-title">왜 이 과일이 추천됐을까요?</div>
      <ul id="jcq-r-feat"></ul>
    </div>
    <a class="jcq-buy" id="jcq-r-buy" href="https://jaecheol.com" target="_blank">🛒 구매하러 가기</a>
    <button class="jcq-share" id="jcq-r-share" onclick="jcqShare()">🔗 결과 공유하기</button>
    <button class="jcq-retry" onclick="jcqReset()">다시 하기</button>
  </div>
</div>

<script>

    features:['울퉁불퉁한 모양이 특징인 프리미엄 감귤이에요','향이 진하고 과육이 탱탱해서 씹는 맛이 있어요','선물용으로 가장 인기 있는 제품이에요'],

    features:['껍질이 얇고 즙이 넘쳐흘러 먹을 때 시원해요','새콤달콤한 맛의 균형이 완벽해요','상큼한 향이 기분을 좋게 해줘요'],
    url:'https://jaecheol.com'

    features:['한 입 베어물면 아삭하고 달콤한 과즙이 가득해요','식이섬유가 풍부해 든든한 간식으로 최고예요','냉장 보관하면 더욱 달콤하고 시원해요'],

    features:['라이코펜이 풍부해 항산화 효과가 뛰어나요','달콤하고 새콤한 맛에 샐러드나 요리에 활용하기 좋아요','다이어트와 피부 건강에 도움이 되는 슈퍼푸드예요'],
    url:'https://jaecheol.com'
  },
  참외:{
    img:'https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?w=600&h=400&fit=crop',
    sub:'향긋하고 달콤한 참외가 딱이에요!',
    features:['한국 대표 여름 과일! 달콤한 향이 가득해요','아삭아삭한 식감과 시원한 달콤함이 특징이에요','엽산과 비타민이 풍부한 건강 과일이에요'],
    url:'https://jaecheol.com'
  }

/* ────────────────────────────────────
   퀴즈 질문
──────────────────────────────────── */
var QS = [
  {
    q:'어떤 맛이 가장 끌리세요?',
    opts:[
      {e:'🍯',t:'진하고 달콤한 맛',s:{레드향:2,사과:2,참외:2}},
      {e:'🍋',t:'새콤달콤 균형 잡힌 맛',s:{천혜향:2,키위:2,토마토:1}},
      {e:'🌺',t:'향이 진하고 과일다운 맛',s:{한라봉:3,사과:1}},
      {e:'🌊',t:'시원하고 담백한 맛',s:{배:3,참외:1}}
    ]
  },
  {
    q:'좋아하는 식감은 어떤 건가요?',
    opts:[
      {e:'🥢',t:'아삭아삭 씹히는 것',s:{사과:3,배:2,참외:2}},
      {e:'💧',t:'즙이 팡팡 터지는 것',s:{레드향:2,천혜향:2,토마토:2}},
      {e:'🍮',t:'부드럽고 말랑한 것',s:{키위:3,한라봉:1}},
      {e:'🧊',t:'탱탱하고 시원한 것',s:{배:2,참외:1,레드향:1}}
    ]
  },
  {
    q:'과일을 주로 어떻게 드세요?',
    opts:[

      {e:'🍽️',t:'잘라서 접시에 놓고',s:{사과:2,배:2,한라봉:1}},
      {e:'🥤',t:'주스나 스무디로',s:{키위:3,토마토:2}},
      {e:'🥗',t:'요리나 샐러드에 활용',s:{토마토:3,키위:1}}
    ]
  },
  {
    q:'어떤 목적으로 드세요?',
    opts:[
      {e:'😋',t:'달달한 간식/후식으로',s:{레드향:2,사과:2,참외:2}},
      {e:'💪',t:'건강/다이어트를 위해',s:{키위:3,토마토:3}},
      {e:'🎁',t:'소중한 분께 선물로',s:{한라봉:3,배:3}},
      {e:'👨‍👩‍👧‍👦',t:'온 가족 함께 먹을 것',s:{사과:2,레드향:1,천혜향:1}}
    ]
  },
  {
    q:'어떤 느낌의 과일이 좋아요?',
    opts:[
      {e:'✨',t:'작고 한 입에 쏙',s:{레드향:2,천혜향:2,키위:1}},
      {e:'❄️',t:'시원하고 청량한 느낌',s:{배:3,참외:2}},
      {e:'🌿',t:'향이 진하고 특색 있는',s:{한라봉:3}},
      {e:'🎨',t:'색 예쁘고 건강한 느낌',s:{토마토:3,키위:2,사과:1}}
    ]
  }
];

/* ────────────────────────────────────
   상태
──────────────────────────────────── */
var STATE = {
  cur: 0,
  scores: {}
};

function initScores(){
  STATE.scores={};
  Object.keys(FRUITS).forEach(function(k){STATE.scores[k]=0;});
}

/* ────────────────────────────────────
   인트로 카드 렌더
──────────────────────────────────── */
(function renderPreview(){
  var el=document.getElementById('jcq-preview');
  Object.keys(FRUITS).forEach(function(k){
    var d=FRUITS[k];
    el.innerHTML+='<div class="jcq-card"><img src="'+d.img+'" alt="'+k+'" loading="lazy"><div class="jcq-card-name">'+k+'</div></div>';
  });
})();

/* ────────────────────────────────────
   퀴즈 로직
──────────────────────────────────── */
function jcqStart(){
  initScores();
  STATE.cur=0;
  document.getElementById('jcq-intro').style.display='none';
  document.getElementById('jcq-quiz').style.display='block';
  jcqRender();
}

function jcqRender(){
  var q=QS[STATE.cur];
  var pct=Math.round((STATE.cur/QS.length)*100);
  document.getElementById('jcq-prog').style.width=pct+'%';
  document.getElementById('jcq-step').textContent=(STATE.cur+1)+' / '+QS.length;
  document.getElementById('jcq-q').textContent=q.q;
  var html='';
  q.opts.forEach(function(o,i){
    html+='<button class="jcq-opt" onclick="jcqPick('+i+')"><span class="oe">'+o.e+'</span><span class="ot">'+o.t+'</span></button>';
  });
  document.getElementById('jcq-opts').innerHTML=html;
}

function jcqPick(i){
  var s=QS[STATE.cur].opts[i].s;
  Object.keys(s).forEach(function(k){STATE.scores[k]+=s[k];});
  STATE.cur++;
  if(STATE.cur<QS.length){
    jcqRender();
  } else {
    jcqShowResult();
  }
}

function jcqShowResult(){
  var winner=Object.keys(STATE.scores).reduce(function(a,b){return STATE.scores[b]>STATE.scores[a]?b:a;});
  var d=FRUITS[winner];
  document.getElementById('jcq-quiz').style.display='none';
  var r=document.getElementById('jcq-result');
  r.style.display='block';
  document.getElementById('jcq-r-img').src=d.img;
  document.getElementById('jcq-r-img').alt=winner;
  document.getElementById('jcq-r-name').textContent=winner;
  document.getElementById('jcq-r-sub').textContent=d.sub;
  var li='';d.features.forEach(function(f){li+='<li>'+f+'</li>';});
  document.getElementById('jcq-r-feat').innerHTML=li;
  var btn=document.getElementById('jcq-r-buy');
  btn.href=d.url;
  btn.textContent='🛒 '+winner+' 구매하러 가기';
}

function jcqShare(){
  var btn=document.getElementById('jcq-r-share');
  if(navigator.share){
    navigator.share({title:'제철삼촌 과일 추천',text:'나에게 딱 맞는 제철과일 찾았어요!',url:location.href});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(location.href).then(function(){
      btn.textContent='✅ 링크가 복사됐어요!';
      setTimeout(function(){btn.textContent='🔗 결과 공유하기';},2000);
    });
  }
}

function jcqReset(){
  initScores();
  STATE.cur=0;
  document.getElementById('jcq-result').style.display='none';
  document.getElementById('jcq-intro').style.display='block';
}
</script>
