<!-- 제철삼촌 과일 추천 퀴즈 | 아임웹 HTML 위젯에 통째로 붙여넣기 -->
<style>
#jcq{font-family:-apple-system,'Apple SD Gothic Neo','맑은 고딕',sans-serif;max-width:520px;margin:0 auto;padding:16px}
#jcq *{box-sizing:border-box}
.jcq-intro{background:#fffbeb;border-radius:20px;padding:40px 24px;text-align:center}
.jcq-badge{display:inline-block;background:#fef08a;color:#92400e;font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;margin-bottom:14px;letter-spacing:.04em}
.jcq-title{font-size:24px;font-weight:800;color:#1c1c1c;line-height:1.3;margin:0 0 8px}
.jcq-sub{font-size:13px;color:#6b7280;margin:0 0 28px;line-height:1.6}
.jcq-fruits{display:flex;justify-content:center;gap:10px;margin-bottom:28px;flex-wrap:wrap}
.jcq-fc{background:#fff;border-radius:14px;padding:14px 16px;width:130px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center}
.jcq-fc .em{font-size:28px;display:block;margin-bottom:5px}
.jcq-fc .nm{font-size:12px;font-weight:700;color:#374151;display:block;margin-bottom:3px}
.jcq-fc .ds{font-size:10px;color:#9ca3af;line-height:1.4}
.jcq-start{display:inline-block;background:#facc15;color:#1c1c1c;font-size:15px;font-weight:800;padding:14px 36px;border-radius:999px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(250,204,21,.4)}
.jcq-start:hover{background:#eab308}

/* 퀴즈 화면 */
.jcq-quiz{display:none;background:#fff;border-radius:20px;padding:32px 24px}
.jcq-prog-wrap{background:#f3f4f6;border-radius:999px;height:5px;margin-bottom:24px}
.jcq-prog{background:#facc15;height:5px;border-radius:999px;transition:width .4s}
.jcq-step{font-size:11px;color:#9ca3af;text-align:center;margin-bottom:16px}
.jcq-q{font-size:19px;font-weight:800;color:#1c1c1c;text-align:center;line-height:1.4;margin-bottom:24px}
.jcq-opts{display:flex;flex-direction:column;gap:10px}
.jcq-opt{display:flex;align-items:center;gap:12px;background:#f9fafb;border:2px solid #f3f4f6;border-radius:14px;padding:14px 18px;text-align:left;cursor:pointer;font-size:14px;font-weight:500;color:#374151;transition:border-color .15s,background .15s;width:100%}
.jcq-opt:hover{border-color:#facc15;background:#fffbeb}
.jcq-opt .oe{font-size:22px}

/* 결과 화면 */
.jcq-result{display:none;background:#fff;border-radius:20px;padding:32px 24px;text-align:center}
.jcq-r-emoji{font-size:72px;margin-bottom:16px}
.jcq-r-badge{display:inline-block;background:#facc15;color:#1c1c1c;font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;margin-bottom:10px}
.jcq-r-name{font-size:26px;font-weight:800;color:#1c1c1c;margin:0 0 6px}
.jcq-r-sub{font-size:13px;color:#6b7280;margin:0 0 20px}
.jcq-r-box{background:#f9fafb;border-radius:14px;padding:18px 20px;margin-bottom:20px;text-align:left}
.jcq-r-box p{font-size:11px;font-weight:700;color:#9ca3af;margin:0 0 10px}
.jcq-r-box ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}
.jcq-r-box li{font-size:13px;color:#374151;display:flex;gap:7px}
.jcq-r-box li::before{content:"✓";color:#facc15;flex-shrink:0;margin-top:1px}
.jcq-buy{display:block;background:#facc15;color:#1c1c1c;font-size:14px;font-weight:800;padding:14px;border-radius:999px;text-decoration:none;margin-bottom:10px}
.jcq-buy:hover{background:#eab308}
.jcq-retry{background:none;border:none;color:#9ca3af;font-size:13px;cursor:pointer;padding:8px;width:100%}
.jcq-retry:hover{color:#6b7280}
</style>

<div id="jcq">
  <!-- 인트로 -->
  <div class="jcq-intro" id="jcq-intro">
    <span class="jcq-badge">🍊 제철삼촌 추천 테스트</span>
    <h2 class="jcq-title">나에게 딱 맞는<br>제철과일은 뭘까요?</h2>
    <p class="jcq-sub">5가지 질문으로 취향에 꼭 맞는 과일을 찾아드려요</p>
    <div class="jcq-fruits">
      <div class="jcq-fc"><span class="em">🍊</span><span class="nm">레드향</span><span class="ds">달콤하고<br>껍질 얇아요</span></div>
      <div class="jcq-fc"><span class="em">🍊</span><span class="nm">한라봉</span><span class="ds">향 진하고<br>과육 탱탱해요</span></div>
      <div class="jcq-fc"><span class="em">🍊</span><span class="nm">천혜향</span><span class="ds">새콤달콤<br>즙이 풍부해요</span></div>
    </div>
    <button class="jcq-start" onclick="jcqStart()">10초만에 내 과일 찾기 →</button>
  </div>

  <!-- 퀴즈 -->
  <div class="jcq-quiz" id="jcq-quiz">
    <div class="jcq-prog-wrap"><div class="jcq-prog" id="jcq-prog" style="width:0%"></div></div>
    <div class="jcq-step" id="jcq-step">1 / 5</div>
    <div class="jcq-q" id="jcq-q"></div>
    <div class="jcq-opts" id="jcq-opts"></div>
  </div>

  <!-- 결과 -->
  <div class="jcq-result" id="jcq-result">
    <div class="jcq-r-emoji">🍊</div>
    <span class="jcq-r-badge">추천 과일</span>
    <h3 class="jcq-r-name" id="jcq-r-name"></h3>
    <p class="jcq-r-sub" id="jcq-r-sub"></p>
    <div class="jcq-r-box">
      <p>왜 이 과일일까요?</p>
      <ul id="jcq-r-features"></ul>
    </div>
    <a class="jcq-buy" id="jcq-r-buy" href="https://jaecheol.com" target="_blank">🛒 구매하기</a>
    <button class="jcq-retry" onclick="jcqReset()">다시 하기</button>
  </div>
</div>

<script>
var JCQ = {
  qs:[
    {q:'어떤 맛이 더 끌리세요?',opts:[
      {t:'달콤달콤한 게 최고',e:'🍯',s:{레드향:3}},
      {t:'새콤달콤 균형이 좋아',e:'🍋',s:{천혜향:3}},
      {t:'향이 진하고 과일다운 맛',e:'🌺',s:{한라봉:3}}
    ]},
    {q:'과일을 주로 어떻게 드세요?',opts:[
      {t:'혼자 간식으로 먹어요',e:'🙋',s:{천혜향:2,레드향:1}},
      {t:'온 가족이 함께 먹어요',e:'🏠',s:{레드향:3}},
      {t:'소중한 분께 선물해요',e:'🎁',s:{한라봉:3}}
    ]},
    {q:'좋아하는 식감은 어떤 건가요?',opts:[
      {t:'즙이 풍부하고 촉촉한 것',e:'💧',s:{천혜향:2,레드향:1}},
      {t:'과육이 탱탱하고 단단한 것',e:'💪',s:{한라봉:3}},
      {t:'시원하고 청량한 느낌',e:'🧊',s:{레드향:3}}
    ]},
    {q:'과일 향은 어느 정도가 좋아요?',opts:[
      {t:'은은하게 향긋한 게 좋아',e:'🌸',s:{레드향:3}},
      {t:'상큼하게 톡 올라오는 향',e:'✨',s:{천혜향:3}},
      {t:'진하고 강한 향이 좋아',e:'🌿',s:{한라봉:3}}
    ]},
    {q:'주로 언제 과일을 즐기시나요?',opts:[
      {t:'아침에 간단하게',e:'🌅',s:{천혜향:2,레드향:1}},
      {t:'식후 디저트로',e:'🍽️',s:{레드향:2,천혜향:1}},
      {t:'특별한 날 테이블에',e:'🎊',s:{한라봉:3}}
    ]}
  ],
  data:{
    레드향:{sub:'달콤하고 향긋한 레드향이 딱이에요!',features:['한라봉×천혜향 교배종으로 두 과일의 장점만 모았어요','껍질이 얇고 즙이 풍부해서 먹기 편해요','당도가 높아 남녀노소 모두 좋아하는 스테디셀러예요'],url:'https://jaecheol.com'},
    한라봉:{sub:'향 진하고 과즙 탱탱한 한라봉이 딱이에요!',features:['울퉁불퉁한 모양이 특징인 프리미엄 감귤이에요','향이 진하고 과육이 탱탱해서 씹는 맛이 있어요','선물용으로 가장 인기 있는 제품이에요'],url:'https://jaecheol.com'},
    천혜향:{sub:'새콤달콤 즙 풍부한 천혜향이 딱이에요!',features:['껍질이 얇고 즙이 넘쳐흘러 먹을 때 시원해요','새콤달콤한 맛의 균형이 완벽해요','상큼한 향이 기분을 좋게 해줘요'],url:'https://jaecheol.com'}
  },
  cur:0,
  scores:{레드향:0,한라봉:0,천혜향:0}
};

function jcqStart(){
  document.getElementById('jcq-intro').style.display='none';
  document.getElementById('jcq-quiz').style.display='block';
  jcqRender();
}
function jcqRender(){
  var q=JCQ.qs[JCQ.cur];
  document.getElementById('jcq-prog').style.width=((JCQ.cur/5)*100)+'%';
  document.getElementById('jcq-step').textContent=(JCQ.cur+1)+' / 5';
  document.getElementById('jcq-q').textContent=q.q;
  var html='';
  q.opts.forEach(function(o,i){
    html+='<button class="jcq-opt" onclick="jcqPick('+i+')"><span class="oe">'+o.e+'</span>'+o.t+'</button>';
  });
  document.getElementById('jcq-opts').innerHTML=html;
}
function jcqPick(i){
  var o=JCQ.qs[JCQ.cur].opts[i];
  Object.keys(o.s).forEach(function(k){JCQ.scores[k]+=o.s[k];});
  JCQ.cur++;
  if(JCQ.cur<5){jcqRender();}
  else{jcqShowResult();}
}
function jcqShowResult(){
  var winner=Object.keys(JCQ.scores).reduce(function(a,b){return JCQ.scores[b]>JCQ.scores[a]?b:a;});
  var d=JCQ.data[winner];
  document.getElementById('jcq-quiz').style.display='none';
  document.getElementById('jcq-result').style.display='block';
  document.getElementById('jcq-r-name').textContent=winner;
  document.getElementById('jcq-r-sub').textContent=d.sub;
  var li='';d.features.forEach(function(f){li+='<li>'+f+'</li>';});
  document.getElementById('jcq-r-features').innerHTML=li;
  document.getElementById('jcq-r-buy').href=d.url;
  document.getElementById('jcq-r-buy').textContent='🛒 '+winner+' 구매하기';
}
function jcqReset(){
  JCQ.cur=0;JCQ.scores={레드향:0,한라봉:0,천혜향:0};
  document.getElementById('jcq-result').style.display='none';
  document.getElementById('jcq-intro').style.display='block';
}
</script>
